apiVersion: enclii.dev/v1
kind: Service
metadata:
  name: eido-api
  project: eido
  description: "Eido API — Reality Capture Ingest, 3DGS Orchestration & Ecosystem Handoffs"

spec:
  build:
    type: dockerfile
    dockerfile: apps/api/Dockerfile
    context: .
    source:
      git:
        repository: https://github.com/madfam-org/eido
        branch: main
        autoDeploy: true

  runtime:
    port: 8000
    replicas: 2
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2000m"
        memory: "1Gi"
    healthCheck: /health
    readinessProbe:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 5
    livenessProbe:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 10

  env:
    - name: EIDO_ENV
      value: production
    - name: APP_VERSION
      value: "0.1.0"
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: eido-secrets
          key: database-url
    - name: REDIS_URL
      valueFrom:
        secretKeyRef:
          name: eido-secrets
          key: redis-url
    - name: S3_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: eido-secrets
          key: r2-access-key-id
    - name: S3_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: eido-secrets
          key: r2-secret-access-key
    # R2 S3-API endpoint is account-specific:
    # https://<cloudflare-account-id>.r2.cloudflarestorage.com — NOT the generic host.
    - name: S3_ENDPOINT
      valueFrom:
        secretKeyRef:
          name: eido-secrets
          key: r2-endpoint
    - name: API_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: eido-secrets
          key: api-secret-key
    # Shared secret for the orchestration worker → API status callback.
    # Must match the identical value on eido-orchestration.
    - name: INTERNAL_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: eido-secrets
          key: internal-api-token
    - name: JANUA_URL
      value: "https://auth.madfam.io"
    - name: JANUA_JWKS_URL
      value: "https://auth.madfam.io/.well-known/jwks.json"
    - name: BLUEPRINT_HARVESTER_URL
      value: "https://api.blueprint.tube"
    - name: YANTRA4D_URL
      value: "https://api.yantra4d.io"
    - name: FACTLAS_URL
      value: "https://api.factl.as"
    - name: CEQ_URL
      value: "https://api.ceq.studio"
    - name: SELVA_URL
      value: "https://api.autoswarm.ai"
    - name: DHANAM_URL
      value: "https://api.dhanam.madfam.io"
    - name: S3_BUCKET_RAW
      value: "eido-raw-production"
    - name: S3_BUCKET_CDN
      value: "eido-cdn-production"
    - name: CDN_BASE_URL
      value: "https://cdn.eido.cam"

  domains:
    - domain: api.eido.cam
      tls: true
      tlsIssuer: cloudflare

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  slo:
    availability: 99.9
    latencyP95: 200
    errorRate: 0.5

---
apiVersion: enclii.dev/v1
kind: Service
metadata:
  name: eido-web
  project: eido
  description: "Eido Web — Next.js WebGL Portfolio Gallery"

spec:
  build:
    type: dockerfile
    dockerfile: apps/web/Dockerfile
    context: .
    source:
      git:
        repository: https://github.com/madfam-org/eido
        branch: main
        autoDeploy: true

  runtime:
    port: 3000
    replicas: 2
    resources:
      requests:
        cpu: "200m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "512Mi"
    healthCheck: /api/health

  env:
    - name: NEXT_PUBLIC_API_URL
      value: "https://api.eido.cam"
    - name: NEXT_PUBLIC_CDN_URL
      value: "https://cdn.eido.cam"
    - name: NEXT_PUBLIC_JANUA_URL
      value: "https://auth.madfam.io"
    - name: NEXT_PUBLIC_JANUA_CLIENT_ID
      value: "eido-web"

  domains:
    - domain: eido.cam
      tls: true
      tlsIssuer: cloudflare

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

  slo:
    availability: 99.9
    latencyP95: 100
    errorRate: 0.5

# NOTE: cdn.eido.cam is NOT an Enclii service domain. It is served directly by
# the Cloudflare R2 bucket `eido-cdn-production` via an R2 custom domain (set in
# the Cloudflare dashboard / API once the zone is on Cloudflare). See
# ops/provision.sh Step 5 and the deployment runbook.

---
apiVersion: enclii.dev/v1
kind: Service
metadata:
  name: eido-orchestration
  project: eido
  description: "Eido GPU Orchestration Worker — 3DGS Pipeline Dispatcher"

spec:
  build:
    type: dockerfile
    dockerfile: services/orchestration/Dockerfile
    context: .
    source:
      git:
        repository: https://github.com/madfam-org/eido
        branch: main
        autoDeploy: true

  runtime:
    # Pure Redis-queue worker — no HTTP server, so no port/healthCheck.
    # Liveness is an exec probe (redis ping) in the K8s manifest.
    replicas: 1
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

  env:
    - name: REDIS_URL
      valueFrom:
        secretKeyRef:
          name: eido-secrets
          key: redis-url
    - name: S3_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: eido-secrets
          key: r2-access-key-id
    - name: S3_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: eido-secrets
          key: r2-secret-access-key
    - name: S3_ENDPOINT
      valueFrom:
        secretKeyRef:
          name: eido-secrets
          key: r2-endpoint
    - name: VAST_API_KEY
      valueFrom:
        secretKeyRef:
          name: eido-secrets
          key: vast-api-key
    # Must match the identical value on eido-api (worker → API status callback).
    - name: INTERNAL_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: eido-secrets
          key: internal-api-token
    - name: EIDO_API_URL
      value: "http://eido-api:8000"
    - name: S3_BUCKET_RAW
      value: "eido-raw-production"
    - name: S3_BUCKET_CDN
      value: "eido-cdn-production"
    - name: CDN_BASE_URL
      value: "https://cdn.eido.cam"
    - name: GPU_PROVIDER
      value: "vast"
