# ── Eido: Enclii Zero-Touch Deployment Manifest ───────────────────────────────
# Enclii reads this file to provision all infrastructure and inject secrets
# without any manual operator intervention.

name: eido
version: "1"
domain: eido.cam
ecosystem: madfam-solarpunk-foundry

services:

  api:
    image: ghcr.io/madfam/eido-api:${EIDO_VERSION}
    port: 8000
    replicas: 2
    healthcheck: /health
    resources:
      cpu: "500m"
      memory: "512Mi"
    env_from_secrets:
      - API_SECRET_KEY
      - JANUA_CLIENT_SECRET
      - S3_ACCESS_KEY_ID
      - S3_SECRET_ACCESS_KEY
    env:
      EIDO_ENV: production
      BLUEPRINT_HARVESTER_URL: "https://api.blueprint.tube"
      YANTRA4D_URL: "https://api.yantra4d.io"
      FACTLAS_URL: "https://api.factl.as"
      CEQ_URL: "https://api.ceq.studio"

  web:
    image: ghcr.io/madfam/eido-web:${EIDO_VERSION}
    port: 3000
    replicas: 2
    healthcheck: /api/health
    cdn: true
    env:
      NEXT_PUBLIC_API_URL: "https://api.eido.cam"
      NEXT_PUBLIC_CDN_URL: "https://cdn.eido.cam"

  orchestration:
    image: ghcr.io/madfam/eido-orchestration:${EIDO_VERSION}
    replicas: 1
    resources:
      cpu: "250m"
      memory: "256Mi"
    env_from_secrets:
      - VAST_API_KEY
      - S3_ACCESS_KEY_ID
      - S3_SECRET_ACCESS_KEY

databases:
  postgres:
    engine: postgres
    version: "16"
    plan: standard
    name: eido

  redis:
    engine: redis
    version: "7"
    plan: micro

storage:
  raw_uploads:
    provider: s3
    bucket: eido-raw-${EIDO_ENV}
    private: true
  cdn_assets:
    provider: s3
    bucket: eido-cdn-${EIDO_ENV}
    public: true
    cloudfront: true

ingress:
  - host: eido.cam
    service: web
    port: 3000
  - host: api.eido.cam
    service: api
    port: 8000
  - host: cdn.eido.cam
    type: cloudfront
    bucket: eido-cdn-${EIDO_ENV}
