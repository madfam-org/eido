# Eido Secrets Template — NEVER commit with real values.
# Provisioned by the operator (enclii onboard --secrets-file / enclii secrets set);
# this file documents the required KEY NAMES only.
#
# Required (services fail to start without these):
#   DATABASE_URL          — api            (own Postgres: enclii addon, NOT the shared CNPG set)
#   REDIS_URL             — api, orchestration (job queue)
#   S3_ENDPOINT           — api, orchestration (https://<CF_ACCOUNT_ID>.r2.cloudflarestorage.com — account-specific)
#   S3_ACCESS_KEY_ID      — api, orchestration (R2 token, Object R/W on eido-raw/eido-cdn buckets)
#   S3_SECRET_ACCESS_KEY  — api, orchestration
#   API_SECRET_KEY        — api
#   INTERNAL_API_TOKEN    — api, orchestration (identical value on both — worker→API status callback)
#   VAST_API_KEY          — orchestration (GPU provisioning)
#
# Optional:
#   JANUA_CLIENT_ID       — api (Janua M2M service client, client_credentials grant;
#                                authenticates outbound handoffs to Factlas /observations)
#   JANUA_CLIENT_SECRET   — api (secret for the JANUA_CLIENT_ID service client). Unset →
#                                handoffs post unauthenticated and Factlas 401s them.
#   SENTRY_DSN            — api
#
# Provision the service client:
#   1. In Janua, create an OAuth client with the client_credentials grant
#      (POST /api/v1/oauth/clients, grant_types: ["client_credentials"]).
#   2. enclii secrets intake submit eido/janua_client_id      --reason "factlas handoff M2M"
#      enclii secrets intake submit eido/janua_client_secret  --reason "factlas handoff M2M"
---
apiVersion: v1
kind: Secret
metadata:
  name: eido-secrets
  namespace: eido
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://eido:<PASSWORD>@<ADDON_HOST>:5432/eido"
  REDIS_URL: "redis://eido-redis.eido.svc.cluster.local:6379/0"
  S3_ENDPOINT: "https://<CLOUDFLARE_ACCOUNT_ID>.r2.cloudflarestorage.com"
  S3_ACCESS_KEY_ID: ""
  S3_SECRET_ACCESS_KEY: ""
  API_SECRET_KEY: ""
  INTERNAL_API_TOKEN: ""
  VAST_API_KEY: ""
