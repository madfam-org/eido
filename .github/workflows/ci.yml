name: CI — Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  ORG: madfam-org

jobs:
  # ── Lint & Test ──────────────────────────────────────────────────────────────
  test-api:
    name: API — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/

      - name: Type check (mypy)
        run: mypy src/eido_api/ --ignore-missing-imports

      - name: Test
        run: pytest tests/ -v --cov=eido_api --cov-report=term-missing

  test-web:
    name: Web — Lint & Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json "packageManager" — action-setup@v4
      # errors when both specify a version.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

  # ── Build & Push Images ──────────────────────────────────────────────────────
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    needs: [test-api]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/eido-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # The eido namespace enforces verify-image-signatures (Kyverno);
      # unsigned images are admission-denied.
      - name: Sign image with cosign
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.ORG }}/eido-api@${{ steps.push.outputs.digest }}

  build-web:
    name: Build Web Image
    runs-on: ubuntu-latest
    needs: [test-web]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/eido-web
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.ORG }}/eido-web@${{ steps.push.outputs.digest }}

  build-orchestration:
    name: Build Orchestration Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/eido-orchestration
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/orchestration/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.ORG }}/eido-orchestration@${{ steps.push.outputs.digest }}

  # ── Deploy (GitOps) ──────────────────────────────────────────────────────────
  # Pins the three image digests directly into the deployment manifests in ONE
  # commit; ArgoCD (registered by `enclii onboard`) reconciles them onto the
  # cluster. Digests live in the RAW files (not a kustomization images block)
  # because the Enclii onboarding gate and Kyverno's require-image-digest
  # policy both inspect raw manifests. No ENCLII_TOKEN needed.
  deploy:
    name: Pin digests (ArgoCD deploys)
    runs-on: ubuntu-latest
    needs: [build-api, build-web, build-orchestration]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Commit image digests
        run: |
          git config user.name "madfam-bot"
          git config user.email "bot@madfam.dev"
          pin() { # pin <file> <image-name> <digest>
            sed -i -E "s|image: $2[@:][^\"]*|image: $2@$3|" "$1"
          }
          for ATTEMPT in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            pin infra/k8s/production/api-deployment.yaml           ghcr.io/${{ env.ORG }}/eido-api           ${{ needs.build-api.outputs.digest }}
            pin infra/k8s/production/web-deployment.yaml           ghcr.io/${{ env.ORG }}/eido-web           ${{ needs.build-web.outputs.digest }}
            pin infra/k8s/production/orchestration-deployment.yaml ghcr.io/${{ env.ORG }}/eido-orchestration ${{ needs.build-orchestration.outputs.digest }}
            git add infra/k8s/production/*-deployment.yaml
            git diff --staged --quiet && echo "No changes to commit" && exit 0
            # [skip ci] breaks the build->pin->build loop; ArgoCD deploys
            # straight from this manifest commit.
            git commit -m "deploy: pin image digests to ${GITHUB_SHA::8} [skip ci]"
            git push origin main && exit 0
            echo "Retry $ATTEMPT..."
            sleep $((ATTEMPT * 10))
          done
          echo "Failed after 3 attempts"
          exit 1

      - name: Smoke test (waits out ArgoCD reconcile + rollout)
        run: |
          for i in $(seq 1 20); do
            if curl -sf --max-time 10 https://api.eido.cam/health | jq .; then
              echo "✅ api.eido.cam is live"
              exit 0
            fi
            echo "not up yet ($i/20) — retrying in 20s"
            sleep 20
          done
          echo "::warning::api.eido.cam did not answer within ~7 min (first deploy: NS propagation or ArgoCD interval may still be settling)"
          exit 1
